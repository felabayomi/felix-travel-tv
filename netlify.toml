[build]
  base = "."
  command = "corepack enable pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/travel-showcase run build"
  publish = "artifacts/travel-showcase/dist/public"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* to the Render backend — set TRAVEL_TV_API_URL in Netlify env vars
[[redirects]]
  from = "/api/*"
  to = "https://felix-travel-tv-api.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
