kind = "web"
previewPath = "/"
title = "Travel Showcase"
version = "1.0.0"
id = "artifacts/travel-showcase"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22143

[services.development]
run = "pnpm --filter @workspace/travel-showcase run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travel-showcase", "run", "build" ]
publicDir = "artifacts/travel-showcase/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22143"
BASE_PATH = "/"
